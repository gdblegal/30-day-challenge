<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>30-Day Challenge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 24px 20px;
      text-align: center;
      border-bottom: 1px solid #ffffff15;
    }

    header h1 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 800;
      background: linear-gradient(90deg, #f7971e, #ffd200, #f7971e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }

    header p {
      color: #aaa;
      margin-top: 6px;
      font-size: 0.9rem;
    }

    .overall-progress {
      background: #1a1a2e;
      margin: 20px 16px;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid #ffffff10;
    }

    .overall-progress h2 {
      font-size: 0.85rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .progress-bar-wrap {
      background: #0f0f1a;
      border-radius: 999px;
      height: 14px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      transition: width 0.5s ease;
    }

    .progress-stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #aaa;
    }

    .progress-stats span b {
      color: #ffd200;
    }

    .habits-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 16px 16px;
    }

    .habit-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1a1a2e;
      border: 1px solid #ffffff10;
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 0.78rem;
      color: #ccc;
    }

    .habit-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 10px;
      padding: 0 16px 16px;
    }

    .day-card {
      background: #1a1a2e;
      border: 1px solid #ffffff10;
      border-radius: 14px;
      padding: 12px 10px;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.2s;
      position: relative;
    }

    .day-card:hover { transform: translateY(-2px); border-color: #ffffff30; }

    .day-card.completed { border-color: #ffd20060; }
    .day-card.today { border-color: #f7971e; box-shadow: 0 0 12px #f7971e40; }

    .day-label {
      font-size: 0.7rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .day-num {
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
      margin: 2px 0 8px;
    }

    .mini-habits {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }

    .mini-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      opacity: 0.25;
      transition: opacity 0.2s;
    }

    .mini-dot.done { opacity: 1; }

    .day-score {
      position: absolute;
      top: 8px; right: 10px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #ffd200;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .day-card.has-progress .day-score { opacity: 1; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000000cc;
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #1a1a2e;
      border: 1px solid #ffffff15;
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .modal-header .today-badge {
      font-size: 0.7rem;
      background: #f7971e;
      color: #000;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 700;
    }

    .close-btn {
      background: #ffffff10;
      border: none;
      color: #fff;
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
    }

    .habit-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid #ffffff08;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .habit-item:last-child { border-bottom: none; }
