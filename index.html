<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>30-Day Challenge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; }
    header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 24px 20px; text-align: center; border-bottom: 1px solid #ffffff15; }
    header h1 { font-size: clamp(1.4rem, 5vw, 2rem); font-weight: 800; background: linear-gradient(90deg, #f7971e, #ffd200, #f7971e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 1px; }
    header p { color: #aaa; margin-top: 6px; font-size: 0.9rem; }
    .overall-progress { background: #1a1a2e; margin: 20px 16px; border-radius: 16px; padding: 20px; border: 1px solid #ffffff10; }
    .overall-progress h2 { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    .progress-bar-wrap { background: #0f0f1a; border-radius: 999px; height: 14px; overflow: hidden; margin-bottom: 10px; }
    .progress-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #f7971e, #ffd200); transition: width 0.5s ease; }
    .progress-stats { display: flex; justify-content: space-between; font-size: 0.85rem; color: #aaa; }
    .progress-stats span b { color: #ffd200; }
    .habits-legend { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 16px 16px; }
    .habit-badge { display: flex; align-items: center; gap: 6px; background: #1a1a2e; border: 1px solid #ffffff10; border-radius: 999px; padding: 5px 12px; font-size: 0.78rem; color: #ccc; }
    .habit-badge .dot { width: 8px; height: 8px; border-radius: 50%; }
    .days-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 10px; padding: 0 16px 80px; }
    .day-card { background: #1a1a2e; border: 1px solid #ffffff10; border-radius: 14px; padding: 12px 10px; cursor: pointer; transition: transform 0.15s, border-color 0.2s; position: relative; }
    .day-card:hover { transform: translateY(-2px); border-color: #ffffff30; }
    .day-card.completed { border-color: #ffd20060; }
    .day-label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
    .day-num { font-size: 1.3rem; font-weight: 800; color: #fff; margin: 2px 0 8px; }
    .mini-habits { display: flex; flex-wrap: wrap; gap: 3px; }
    .mini-dot { width: 10px; height: 10px; border-radius: 50%; opacity: 0.25; transition: opacity 0.2s; }
    .mini-dot.done { opacity: 1; }
    .day-score { position: absolute; top: 8px; right: 10px; font-size: 0.7rem; font-weight: 700; color: #ffd200; opacity: 0; transition: opacity 0.2s; }
    .day-card.has-progress .day-score { opacity: 1; }
    .scale-icon { font-size: 0.65rem; position: absolute; bottom: 7px; right: 8px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: #000000cc; z-index: 100; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1a1a2e; border: 1px solid #ffffff15; border-radius: 20px; padding: 24px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-header h2 { font-size: 1.1rem; font-weight: 700; }
    .today-badge { font-size: 0.7rem; background: #f7971e; color: #000; padding: 3px 8px; border-radius: 999px; font-weight: 700; }
    .close-btn { background: #ffffff10; border: none; color: #fff; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
    .habit-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid #ffffff08; cursor: pointer; transition: opacity 0.15s; user-select: none; }
    .habit-item:last-child { border-bottom: none; }
    .habit-item:hover { opacity: 0.85; }
    .habit-icon { font-size: 1.4rem; width: 36px; text-align: center; }
    .habit-info { flex: 1; }
    .habit-name { font-size: 0.95rem; font-weight: 600; }
    .habit-target { font-size: 0.78rem; color: #888; margin-top: 2px; }
    .habit-check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; transition: all 0.2s; flex-shrink: 0; }
    .habit-check.checked { background: linear-gradient(135deg, #f7971e, #ffd200); border-color: transparent; color: #000; font-weight: 700; }
    .modal-footer { margin-top: 20px; text-align: center; }
    .save-btn { background: linear-gradient(135deg, #f7971e, #ffd200); color: #000; border: none; border-radius: 999px; padding: 12px 36px; font-size: 0.95rem; font-weight: 700; cursor: pointer; width: 100%; transition: opacity 0.2s; }
    .save-btn:hover { opacity: 0.9; }
    .day-complete-badge { display: none; text-align: center; margin-top: 16px; font-size: 0.85rem; color: #ffd200; font-weight: 600; }
    .day-complete-badge.show { display: block; }
    .streak-bar { display: flex; gap: 12px; margin: 0 16px 20px; }
    .streak-card { flex: 1; background: #1a1a2e; border: 1px solid #ffffff10; border-radius: 14px; padding: 14px; text-align: center; }
    .streak-card .val { font-size: 1.6rem; font-weight: 800; color: #ffd200; }
    .streak-card .lbl { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    /* Weight Section */
    .weight-section { background: #1a1a2e; margin: 0 16px 20px; border-radius: 16px; padding: 20px; border: 1px solid #a78bfa30; }
    .weight-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .weight-section-title { font-size: 0.85rem; color: #a78bfa; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
    .unit-toggle { display: flex; border-radius: 999px; overflow: hidden; border: 1.5px solid #a78bfa50; }
    .unit-btn { background: transparent; border: none; color: #888; font-size: 0.72rem; font-weight: 600; padding: 5px 11px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .unit-btn.active { background: #a78bfa; color: #000; }
    .weight-entries { display: flex; gap: 10px; }
    .weight-entry { flex: 1; background: #0f0f1a; border-radius: 12px; padding: 12px 8px; text-align: center; min-width: 0; }
    .weight-entry .we-label { font-size: 0.7rem; color: #666; text-transform: uppercase; margin-bottom: 6px; }
    .weight-entry .we-val { font-size: clamp(0.78rem, 2.4vw, 1.1rem); font-weight: 800; color: #a78bfa; word-break: break-word; line-height: 1.3; }
    .weight-entry .we-val.empty { color: #333; font-weight: 400; }
    .weight-diff { text-align: center; margin-top: 12px; font-size: 0.85rem; font-weight: 600; }
    .weight-diff .loss { color: #4ade80; }
    .weight-diff .gain { color: #f87171; }
    .weight-diff .neutral { color: #888; }

    /* Weigh-in modal */
    .weigh-in-box { background: #0f0f1a; border-radius: 14px; padding: 16px; margin-bottom: 16px; border: 1px solid #a78bfa50; }
    .weigh-in-box-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .weigh-in-box-title { font-size: 0.8rem; color: #a78bfa; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
    .modal-unit-toggle { display: flex; border-radius: 999px; overflow: hidden; border: 1.5px solid #a78bfa50; }
    .modal-unit-btn { background: transparent; border: none; color: #888; font-size: 0.7rem; font-weight: 600; padding: 4px 9px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .modal-unit-btn.active { background: #a78bfa; color: #000; }
    .weigh-in-row { display: flex; align-items: center; gap: 10px; }
    .weigh-in-input { background: #1a1a2e; border: 1.5px solid #a78bfa50; border-radius: 10px; padding: 10px 14px; color: #fff; font-size: 1.1rem; font-weight: 700; flex: 1; outline: none; transition: border-color 0.2s; width: 100%; }
    .weigh-in-input:focus { border-color: #a78bfa; }
    .weigh-in-unit { color: #888; font-size: 0.9rem; white-space: nowrap; }
    .stlbs-row { display: flex; align-items: center; gap: 10px; }
    .stlbs-group { display: flex; align-items: center; gap: 6px; flex: 1; }
    .stlbs-input { background: #1a1a2e; border: 1.5px solid #a78bfa50; border-radius: 10px; padding: 10px 10px; color: #fff; font-size: 1.1rem; font-weight: 700; width: 100%; outline: none; transition: border-color 0.2s; }
    .stlbs-input:focus { border-color: #a78bfa; }
    .stlbs-unit { color: #888; font-size: 0.9rem; white-space: nowrap; }
    .weigh-in-prev { margin-top: 10px; font-size: 0.78rem; color: #666; }
    .weigh-in-prev span { color: #a78bfa; font-weight: 600; }
  </style>
</head>
<body>

  <header>
    <h1>🔥 30-Day Challenge</h1>
    <p>Track your daily habits — one day at a time</p>
  </header>

  <div class="overall-progress">
    <h2>Overall Progress</h2>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="overall-bar" style="width:0%"></div>
    </div>
    <div class="progress-stats">
      <span><b id="days-done">0</b> days completed</span>
      <span><b id="days-left">30</b> days left</span>
    </div>
  </div>

  <div class="streak-bar">
    <div class="streak-card">
      <div class="val" id="current-streak">0</div>
      <div class="lbl">🔥 Streak</div>
    </div>
    <div class="streak-card">
      <div class="val" id="best-streak">0</div>
      <div class="lbl">⭐ Best</div>
    </div>
    <div class="streak-card">
      <div class="val" id="total-habits">0</div>
      <div class="lbl">✅ Habits</div>
    </div>
  </div>

  <div class="weight-section">
    <div class="weight-section-header">
      <div class="weight-section-title">⚖️ Weight Progress</div>
      <div class="unit-toggle">
        <button class="unit-btn" id="btn-kg"    onclick="setUnit('kg')">kg</button>
        <button class="unit-btn" id="btn-stlbs" onclick="setUnit('stlbs')">st &amp; lbs</button>
      </div>
    </div>
    <div class="weight-entries">
      <div class="weight-entry">
        <div class="we-label">Day 1</div>
        <div class="we-val empty" id="w1">—</div>
      </div>
      <div class="weight-entry">
        <div class="we-label">Day 15</div>
        <div class="we-val empty" id="w15">—</div>
      </div>
      <div class="weight-entry">
        <div class="we-label">Day 30</div>
        <div class="we-val empty" id="w30">—</div>
      </div>
    </div>
    <div class="weight-diff" id="weight-diff"></div>
  </div>

  <div class="habits-legend" id="habits-legend"></div>
  <div class="days-grid" id="days-grid"></div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Day 1</h2>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="today-badge" id="today-badge" style="display:none">TODAY</span>
          <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
      </div>
      <div id="weigh-in-container"></div>
      <div id="habits-list"></div>
      <div class="modal-footer">
        <button class="save-btn" onclick="saveDay()">Save Day</button>
        <div class="day-complete-badge" id="complete-badge">🎉 Perfect Day! All habits done!</div>
      </div>
    </div>
  </div>

  <script>
    const HABITS = [
      { id: 'sleep',    icon: '😴', name: 'Sleep',       target: '7 hours',           color: '#a78bfa' },
      { id: 'workout',  icon: '💪', name: 'Workout',      target: '45 minutes',        color: '#f87171' },
      { id: 'calories', icon: '🥗', name: 'Calorie Goal', target: '1000 calories max', color: '#4ade80' },
      { id: 'water',    icon: '💧', name: 'Water',        target: '2 litres',          color: '#38bdf8' },
      { id: 'steps',    icon: '👟', name: 'Steps',        target: 'Min 5,000 steps',   color: '#60a5fa' },
    ];

    const WEIGH_IN_DAYS = [1, 15, 30];
    const TOTAL_DAYS = 30;

    let data        = {};
    let currentDay  = null;
    let tempChecks  = {};
    let tempWeightKg = null;   // single source of truth, always kg
    let tempSt      = '';
    let tempLbs     = '';
    let weightUnit  = 'kg';    // 'kg' | 'stlbs'

    // ── Persistence ───────────────────────────────────────
    try { const s = localStorage.getItem('30day_challenge_v2'); if (s) data = JSON.parse(s); } catch(e) {}
    try { const u = localStorage.getItem('30day_weight_unit'); if (u === 'kg' || u === 'stlbs') weightUnit = u; } catch(e) {}

    function saveData() {
      try { localStorage.setItem('30day_challenge_v2', JSON.stringify(data)); } catch(e) {}
    }

    // ── Conversion helpers ────────────────────────────────
    function kgToStLbs(kg) {
      const totalLbs = kg / 0.453592;
      const st  = Math.floor(totalLbs / 14);
      const lbs = Math.round((totalLbs % 14) * 10) / 10;
      return { st, lbs };
    }

    function stLbsToKg(st, lbs) {
      const total = (parseFloat(st) || 0) * 14 + (parseFloat(lbs) || 0);
      return total * 0.453592;
    }

    function formatWeight(kg) {
      if (!kg) return null;
      if (weightUnit === 'kg') return kg.toFixed(1) + ' kg';
      const { st, lbs } = kgToStLbs(kg);
      return `${st}st ${lbs.toFixed(1)}lb`;
    }

    function formatDiff(diffKg) {
      const abs = Math.abs(diffKg);
      if (weightUnit === 'kg') return abs.toFixed(1) + ' kg';
      const totalLbs = abs / 0.453592;
      const st  = Math.floor(totalLbs / 14);
      const lbs = Math.round((totalLbs % 14) * 10) / 10;
      return st > 0 ? `${st}st ${lbs.toFixed(1)}lb` : `${lbs.toFixed(1)}lb`;
    }

    // ── Unit switching ────────────────────────────────────
    function setUnit(newUnit) {
      // Capture whatever is currently in the modal DOM before switching
      if (currentDay && WEIGH_IN_DAYS.includes(currentDay)) syncWeightFromDOM();

      weightUnit = newUnit;
      try { localStorage.setItem('30day_weight_unit', newUnit); } catch(e) {}

      // Pre-fill stones/lbs from kg if switching to stlbs
      if (newUnit === 'stlbs' && tempWeightKg) {
        const { st, lbs } = kgToStLbs(tempWeightKg);
        tempSt  = st.toString();
        tempLbs = lbs.toFixed(1);
      }

      refreshUnitButtons();
      updateWeightDisplay();
      if (currentDay && WEIGH_IN_DAYS.includes(currentDay)) renderWeighIn(currentDay);
    }

    function syncWeightFromDOM() {
      if (weightUnit === 'kg') {
        const el = document.getElementById('weight-input-kg');
        if (el) tempWeightKg = el.value ? parseFloat(el.value) : null;
      } else {
        const stEl  = document.getElementById('weight-input-st');
        const lbsEl = document.getElementById('weight-input-lbs');
        if (stEl)  tempSt  = stEl.value;
        if (lbsEl) tempLbs = lbsEl.value;
        const kg = stLbsToKg(tempSt, tempLbs);
        tempWeightKg = kg > 0 ? kg : null;
      }
    }

    function updateTempWeightFromStLbs() {
      const kg = stLbsToKg(tempSt, tempLbs);
      tempWeightKg = kg > 0 ? kg : null;
    }

    function refreshUnitButtons() {
      document.getElementById('btn-kg').classList.toggle('active', weightUnit === 'kg');
      document.getElementById('btn-stlbs').classList.toggle('active', weightUnit === 'stlbs');
    }

    // ── Grid & stats ──────────────────────────────────────
    function getDayScore(d) {
      const day = data[d]; if (!day) return 0;
      return HABITS.filter(h => day[h.id]).length;
    }
    function isDayComplete(d) { return getDayScore(d) === HABITS.length; }

    function buildLegend() {
      document.getElementById('habits-legend').innerHTML = HABITS.map(h => `
        <div class="habit-badge">
          <div class="dot" style="background:${h.color}"></div>
          ${h.icon} ${h.name}
        </div>`).join('');
    }

    function buildGrid() {
      const grid = document.getElementById('days-grid');
      grid.innerHTML = '';
      for (let d = 1; d <= TOTAL_DAYS; d++) {
        const score     = getDayScore(d);
        const complete  = isDayComplete(d);
        const isWDay    = WEIGH_IN_DAYS.includes(d);
        const hasWeight = data[d] && data[d].weight;
        const card = document.createElement('div');
        card.className = 'day-card' + (complete ? ' completed' : '') + (score > 0 ? ' has-progress' : '');
        card.innerHTML = `
          <div class="day-score">${score}/${HABITS.length}</div>
          <div class="day-label">Day</div>
          <div class="day-num">${d}</div>
          <div class="mini-habits">
            ${HABITS.map(h => `<div class="mini-dot ${data[d] && data[d][h.id] ? 'done' : ''}" style="background:${h.color}" title="${h.name}"></div>`).join('')}
          </div>
          ${isWDay ? `<div class="scale-icon" title="Weigh-in day">${hasWeight ? '⚖️' : '🔘'}</div>` : ''}`;
        card.onclick = () => openModal(d);
        grid.appendChild(card);
      }
    }

    function updateStats() {
      let completed = 0, totalDone = 0, best = 0, streak = 0;
      for (let d = 1; d <= TOTAL_DAYS; d++) {
        totalDone += getDayScore(d);
        if (isDayComplete(d)) { completed++; streak++; best = Math.max(best, streak); }
        else streak = 0;
      }
      let cur = 0;
      for (let d = TOTAL_DAYS; d >= 1; d--) { if (isDayComplete(d)) cur++; else break; }

      document.getElementById('days-done').textContent     = completed;
      document.getElementById('days-left').textContent     = TOTAL_DAYS - completed;
      document.getElementById('overall-bar').style.width   = ((completed / TOTAL_DAYS) * 100) + '%';
      document.getElementById('current-streak').textContent = cur;
      document.getElementById('best-streak').textContent   = best;
      document.getElementById('total-habits').textContent  = totalDone;
      updateWeightDisplay();
    }

    function updateWeightDisplay() {
      const w1  = data[1]  && data[1].weight  ? data[1].weight  : null;
      const w15 = data[15] && data[15].weight ? data[15].weight : null;
      const w30 = data[30] && data[30].weight ? data[30].weight : null;

      const set = (id, kg) => {
        const el = document.getElementById(id);
        el.textContent = formatWeight(kg) || '—';
        el.className   = 'we-val' + (kg ? '' : ' empty');
      };
      set('w1', w1); set('w15', w15); set('w30', w30);
      refreshUnitButtons();

      const diffEl = document.getElementById('weight-diff');
      const base   = w1;
      const latest = w30 || w15;
      if (base && latest) {
        const diff  = latest - base;
        const label = w30 ? 'overall' : 'at halfway';
        if (diff < 0) diffEl.innerHTML = `<span class="loss">▼ ${formatDiff(diff)} lost ${label} 🎉</span>`;
        else if (diff > 0) diffEl.innerHTML = `<span class="gain">▲ ${formatDiff(diff)} gained ${label}</span>`;
        else diffEl.innerHTML = `<span class="neutral">No change in weight ${label}</span>`;
      } else {
        diffEl.innerHTML = '';
      }
    }

    // ── Modal ─────────────────────────────────────────────
    function openModal(dayNum) {
      currentDay   = dayNum;
      tempChecks   = Object.assign({}, data[dayNum] || {});
      tempWeightKg = data[dayNum] && data[dayNum].weight ? data[dayNum].weight : null;

      if (weightUnit === 'stlbs' && tempWeightKg) {
        const { st, lbs } = kgToStLbs(tempWeightKg);
        tempSt = st.toString(); tempLbs = lbs.toFixed(1);
      } else {
        tempSt = ''; tempLbs = '';
      }

      document.getElementById('modal-title').textContent   = 'Day ' + dayNum;
      document.getElementById('today-badge').style.display = 'none';
      renderWeighIn(dayNum);
      renderHabitsList();
      updateCompleteBadge();
      document.getElementById('modal-overlay').classList.add('open');
    }

    function renderWeighIn(dayNum) {
      const container = document.getElementById('weigh-in-container');
      if (!WEIGH_IN_DAYS.includes(dayNum)) { container.innerHTML = ''; return; }

      // Previous weight hint
      let prevHint = '';
      if (dayNum === 15 && data[1] && data[1].weight) {
        prevHint = `<div class="weigh-in-prev">Day 1: <span>${formatWeight(data[1].weight)}</span></div>`;
      } else if (dayNum === 30) {
        const parts = [];
        if (data[1]  && data[1].weight)  parts.push(`Day 1: <span>${formatWeight(data[1].weight)}</span>`);
        if (data[15] && data[15].weight) parts.push(`Day 15: <span>${formatWeight(data[15].weight)}</span>`);
        if (parts.length) prevHint = `<div class="weigh-in-prev">${parts.join(' &nbsp;·&nbsp; ')}</div>`;
      }

      let inputHTML = '';
      if (weightUnit === 'kg') {
        const val = tempWeightKg ? tempWeightKg.toFixed(1) : '';
        inputHTML = `
          <div class="weigh-in-row">
            <input class="weigh-in-input" type="number" step="0.1" min="0" placeholder="Enter weight"
              value="${val}" id="weight-input-kg"
              oninput="tempWeightKg = this.value ? parseFloat(this.value) : null" />
            <span class="weigh-in-unit">kg</span>
          </div>`;
      } else {
        const stVal  = tempSt  !== '' ? tempSt  : (tempWeightKg ? kgToStLbs(tempWeightKg).st : '');
        const lbsVal = tempLbs !== '' ? tempLbs : (tempWeightKg ? kgToStLbs(tempWeightKg).lbs.toFixed(1) : '');
        inputHTML = `
          <div class="stlbs-row">
            <div class="stlbs-group">
              <input class="stlbs-input" type="number" min="0" step="1" placeholder="0"
                value="${stVal}" id="weight-input-st"
                oninput="tempSt = this.value; updateTempWeightFromStLbs()" />
              <span class="stlbs-unit">st</span>
            </div>
            <div class="stlbs-group">
              <input class="stlbs-input" type="number" min="0" max="13.9" step="0.1" placeholder="0.0"
                value="${lbsVal}" id="weight-input-lbs"
                oninput="tempLbs = this.value; updateTempWeightFromStLbs()" />
              <span class="stlbs-unit">lbs</span>
            </div>
          </div>`;
      }

      container.innerHTML = `
        <div class="weigh-in-box">
          <div class="weigh-in-box-header">
            <div class="weigh-in-box-title">⚖️ Weigh-In — Day ${dayNum}</div>
            <div class="modal-unit-toggle">
              <button class="modal-unit-btn ${weightUnit === 'kg'     ? 'active' : ''}" onclick="setUnit('kg')">kg</button>
              <button class="modal-unit-btn ${weightUnit === 'stlbs'  ? 'active' : ''}" onclick="setUnit('stlbs')">st &amp; lbs</button>
            </div>
          </div>
          ${inputHTML}
          ${prevHint}
        </div>`;
    }

    function renderHabitsList() {
      document.getElementById('habits-list').innerHTML = HABITS.map(h => `
        <div class="habit-item" onclick="toggleHabit('${h.id}')">
          <div class="habit-icon">${h.icon}</div>
          <div class="habit-info">
            <div class="habit-name">${h.name}</div>
            <div class="habit-target">${h.target}</div>
          </div>
          <div class="habit-check ${tempChecks[h.id] ? 'checked' : ''}" id="check-${h.id}">
            ${tempChecks[h.id] ? '✓' : ''}
          </div>
        </div>`).join('');
    }

    function toggleHabit(id) {
      tempChecks[id] = !tempChecks[id];
      const el = document.getElementById('check-' + id);
      el.classList.toggle('checked', tempChecks[id]);
      el.textContent = tempChecks[id] ? '✓' : '';
      updateCompleteBadge();
    }

    function updateCompleteBadge() {
      document.getElementById('complete-badge').classList.toggle('show', HABITS.every(h => tempChecks[h.id]));
    }

    function saveDay() {
      if (WEIGH_IN_DAYS.includes(currentDay)) syncWeightFromDOM();
      data[currentDay] = { ...tempChecks };
      if (WEIGH_IN_DAYS.includes(currentDay)) {
        if (tempWeightKg && tempWeightKg > 0) data[currentDay].weight = parseFloat(tempWeightKg.toFixed(3));
        else delete data[currentDay].weight;
      }
      saveData();
      buildGrid();
      updateStats();
      closeModal();
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      currentDay = null;
    }

    document.getElementById('modal-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // ── Init ──────────────────────────────────────────────
    refreshUnitButtons();
    buildLegend();
    buildGrid();
    updateStats();
  </script>
</body>
</html>
